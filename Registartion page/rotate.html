<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rotate {
            display: flex;
            animation: 2s spin linear infinite;
        }
        @keyframes spin {
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="rotate">
            <div class="p">P</div>
            <div class="u">u</div>
            <div class="n">n</div>
            <div class="i">i</div>
            <div class="t">t</div>
        </div>
    </div>
</body>

</html>

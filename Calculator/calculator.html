<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>

<body>

    <table>
    <tr>
        <td colspan="4"><input type="text" id="input"></td>
    </tr>

    <tr>
        <td><button><img src="./images/delet.png"></button></td>
        <td><button><img src="./images/icons8-cancel-32.png"></button></td>
        <td><button><img src="./images/persentage.png"></button></td>
        <td><button><img src="./images/icons8-divide-50.png"></button></td>
    </tr>

    <tr>
        <td><button>7</button></td>
        <td><button>8</button></td>
        <td><button>9</button></td>
        <td><button><img src="./images/icons8-multiply-50.png"></button></td>
    </tr>

    <tr>
        <td><button>4</button></td>
        <td><button>5</button></td>
        <td><button>6</button></td>
        <td><button><img src="./images/icons8-minus-24.png"></button></td>
    </tr>

    <tr>
        <td><button>1</button></td>
        <td><button>2</button></td>
        <td><button>3</button></td>
        <td><button><img src="./images/pluse.png"></button></td>
    </tr>

    <tr>
        <td><button>00</button></td>
        <td><button>0</button></td>
        <td><button>.</button></td>
        <td><button><img src="./images/icons8-equal-sign-50.png"></button></td>
    </tr>
</table>

<script src="add.js"></script>
</body>

</html>

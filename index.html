<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./project.css">
</head>

<body>
    <button class="toggle-btn" onclick="toggleMode()">🌙</button>
    <div class="container">
        <h1>My Projects</h1>
        <a href="./food task/index.html">Food Task</a>
        <a href="./Calculator/calculator.html">Calculator</a>
        <a href="./Registartion page/registration.html">Login Page</a>
        <a href="./Coffe/coffe.html">Coffe Shop</a>
    </div>
    <script>
        function toggleMode() {
            document.body.classList.toggle("dark");

            let btn = document.querySelector(".toggle-btn");

            if (document.body.classList.contains("dark")) {
                btn.textContent = "☀️";
                localStorage.setItem("theme", "dark");  
            } else {
                btn.textContent = "🌙";
                localStorage.setItem("theme", "light");  
            }
        }

        window.onload = function () {
            let savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.body.classList.add("dark");
                document.querySelector(".toggle-btn").textContent = "☀️";
            }
        }
    </script>
</body>

</html>
